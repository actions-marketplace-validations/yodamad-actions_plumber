name: "Plumber CI/CD Compliance Scan"
description: "Analyze GitHub Actions workflows with [Plumber](https://getplumber.io)"
author: "Plumber (getplumber.io)"

branding:
  icon: "shield"
  color: "blue"

inputs:
  # ── Installation ──────────────────────────────────────────────────────────────
  version:
    description: "Plumber release tag to install (e.g. v0.3.10). Use 'latest' for the most recent release."
    default: "latest"

  verify-attestation:
    description: "Verify the downloaded binary's build-provenance attestation (sigstore/SLSA) against the getplumber/plumber release workflow. Disable for air-gapped or GHES setups without attestation access."
    default: "true"

  # ── Authentication ────────────────────────────────────────────────────────────
  github-token:
    description: "GitHub token for API access (branch protection, advisory DB) and SARIF upload. The job must have security-events:write to upload SARIF."
    default: ${{ github.token }}

  # ── Project scope ─────────────────────────────────────────────────────────────
  project:
    description: "owner/repo to scan remotely (no checkout required). Defaults to the repository running the action."
    default: ""

  github-url:
    description: "GitHub Enterprise Server host (e.g. ghes.example.com). Omit for github.com."
    default: ""

  # ── Compliance ────────────────────────────────────────────────────────────────
  threshold:
    description: "Minimum compliance percentage required to pass (0-100)."
    default: "100"

  config-file:
    description: "Path to a .plumber.yaml config file (relative to repo root). Auto-detected if omitted."
    default: ""

  controls:
    description: "Run only these controls (comma-separated names). Mutually exclusive with skip-controls."
    default: ""

  skip-controls:
    description: "Skip these controls (comma-separated names). Mutually exclusive with controls."
    default: ""

  fail-warnings:
    description: "Treat configuration warnings (unknown keys) as errors (exit 2)."
    default: "false"

  # ── Scoring ───────────────────────────────────────────────────────────────────
  score:
    description: "Print the Plumber letter score, points and full breakdown in the job log and job summary."
    default: "true"

  # ── Failure behaviour ─────────────────────────────────────────────────────────
  soft-fail:
    description: "Do not fail the job when compliance is below the threshold. Findings are still reported and uploaded. Runtime errors (exit 2) still fail the job."
    default: "false"

  # ── Outputs ───────────────────────────────────────────────────────────────────
  output:
    description: "Path for the JSON compliance report. Leave empty to skip."
    default: "plumber-report.json"

  pbom:
    description: "Path for the Pipeline Bill of Materials (PBOM) JSON. Leave empty to skip."
    default: "plumber-pbom.json"

  pbom-cyclonedx:
    description: "Path for the CycloneDX SBOM (compatible with GitHub dependency submission). Leave empty to skip."
    default: "plumber-cyclonedx-sbom.json"

  sarif:
    description: "Path for the SARIF 2.1.0 report. Leave empty to skip SARIF generation."
    default: "plumber.sarif"

  # ── Artifact upload ───────────────────────────────────────────────────────────
  upload-sarif:
    description: "Upload the SARIF report to GitHub Code Scanning (requires security-events:write on the job)."
    default: "true"

  upload-artifacts:
    description: "Upload the JSON report, PBOM and CycloneDX SBOM as a workflow artifact."
    default: "true"

  artifact-name:
    description: "Name of the uploaded artifact bundle."
    default: "plumber-compliance"

  artifact-retention-days:
    description: "Artifact retention in days."
    default: "30"

outputs:
  compliance:
    description: "Overall compliance percentage (e.g. '85')."
    value: ${{ steps.run.outputs.compliance }}

  passed:
    description: "'true' when compliance is at or above the threshold."
    value: ${{ steps.run.outputs.passed }}

  report:
    description: "Path to the JSON compliance report."
    value: ${{ inputs.output }}

  sarif:
    description: "Path to the SARIF report."
    value: ${{ inputs.sarif }}

runs:
  using: "composite"
  steps:
    # ── 1. Install the Plumber binary ─────────────────────────────────────────
    - name: Install Plumber
      shell: bash
      env:
        PLUMBER_VERSION: ${{ inputs.version }}
        VERIFY_ATTESTATION: ${{ inputs.verify-attestation }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        case "$RUNNER_OS" in
          Linux)   os=linux   ;;
          macOS)   os=darwin  ;;
          Windows) os=windows ;;
          *) echo "::error::Unsupported runner OS: $RUNNER_OS"; exit 1 ;;
        esac
        case "$RUNNER_ARCH" in
          X64)   arch=amd64 ;;
          ARM64) arch=arm64 ;;
          *) echo "::error::Unsupported runner arch: $RUNNER_ARCH"; exit 1 ;;
        esac
        ext=""; [ "$os" = "windows" ] && ext=".exe"
        asset="plumber-${os}-${arch}${ext}"

        if [ "$PLUMBER_VERSION" = "latest" ]; then
          base="https://github.com/getplumber/plumber/releases/latest/download"
        else
          base="https://github.com/getplumber/plumber/releases/download/${PLUMBER_VERSION}"
        fi

        tmp="$(mktemp -d)"
        echo "Downloading ${asset} from ${base}"
        curl -fsSL -o "${tmp}/${asset}"        "${base}/${asset}"
        curl -fsSL -o "${tmp}/checksums.txt"  "${base}/checksums.txt"

        # Verify checksum (guards transit integrity)
        line="$(grep "  ${asset}\$" "${tmp}/checksums.txt" || true)"
        if [ -z "$line" ]; then
          echo "::error::No checksum entry for ${asset} in checksums.txt"; exit 1
        fi
        ( cd "$tmp" && { command -v sha256sum >/dev/null 2>&1 \
            && printf '%s\n' "$line" | sha256sum -c - \
            || printf '%s\n' "$line" | shasum -a 256 -c -; } )

        # Verify build provenance via sigstore/SLSA (guards against a re-pointed tag)
        if [ "$VERIFY_ATTESTATION" = "true" ]; then
          if command -v gh >/dev/null 2>&1; then
            echo "Verifying build provenance attestation for ${asset}"
            gh attestation verify "${tmp}/${asset}" --repo getplumber/plumber
          else
            echo "::error::verify-attestation is true but gh CLI is not available. Install gh or set verify-attestation: false."
            exit 1
          fi
        fi

        bindir="${tmp}/bin"; mkdir -p "$bindir"
        mv "${tmp}/${asset}" "${bindir}/plumber${ext}"
        chmod +x "${bindir}/plumber${ext}"
        echo "$bindir" >> "$GITHUB_PATH"
        echo "Plumber installed: $(${bindir}/plumber${ext} --version 2>/dev/null || true)"

    # ── 2. Run Plumber analyze ────────────────────────────────────────────────
    - name: Run Plumber analyze
      id: run
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        IN_PROJECT:       ${{ inputs.project }}
        IN_GITHUB_URL:    ${{ inputs.github-url }}
        IN_THRESHOLD:     ${{ inputs.threshold }}
        IN_CONFIG:        ${{ inputs.config-file }}
        IN_CONTROLS:      ${{ inputs.controls }}
        IN_SKIP_CONTROLS: ${{ inputs.skip-controls }}
        IN_SCORE:         ${{ inputs.score }}
        IN_FAIL_WARNINGS: ${{ inputs.fail-warnings }}
        IN_OUTPUT:        ${{ inputs.output }}
        IN_PBOM:          ${{ inputs.pbom }}
        IN_PBOM_CDX:      ${{ inputs.pbom-cyclonedx }}
        IN_SARIF:         ${{ inputs.sarif }}
      run: |
        set -uo pipefail

        args=(analyze --threshold "$IN_THRESHOLD")

        if [ -n "$IN_PROJECT" ]; then
          gh_url="${IN_GITHUB_URL:-github.com}"
          args+=(--github-url "$gh_url" --project "$IN_PROJECT")
        fi

        [ -n "$IN_CONFIG" ]          && args+=(--config         "$IN_CONFIG")
        [ -n "$IN_CONTROLS" ]        && args+=(--controls       "$IN_CONTROLS")
        [ -n "$IN_SKIP_CONTROLS" ]   && args+=(--skip-controls  "$IN_SKIP_CONTROLS")
        [ "$IN_SCORE" = "true" ]     && args+=(--score-point)
        [ "$IN_FAIL_WARNINGS" = "true" ] && args+=(--fail-warnings)
        [ -n "$IN_OUTPUT" ]          && args+=(--output         "$IN_OUTPUT")
        [ -n "$IN_PBOM" ]            && args+=(--pbom           "$IN_PBOM")
        [ -n "$IN_PBOM_CDX" ]        && args+=(--pbom-cyclonedx "$IN_PBOM_CDX")
        [ -n "$IN_SARIF" ]           && args+=(--sarif          "$IN_SARIF")

        plumber "${args[@]}"
        echo "exit_code=$?" >> "$GITHUB_OUTPUT"

        # Surface compliance percentage and pass/fail as step outputs
        if [ -n "$IN_OUTPUT" ] && [ -f "$IN_OUTPUT" ] && command -v python3 >/dev/null 2>&1; then
          comp="$(python3 -c "
        import json,sys
        d=json.load(open(sys.argv[1]))
        print(d.get('compliance',''))
        " "$IN_OUTPUT" 2>/dev/null || true)"
          passed="$(python3 -c "
        import json,sys
        d=json.load(open(sys.argv[1]))
        print(str(d.get('passed','')).lower())
        " "$IN_OUTPUT" 2>/dev/null || true)"
          echo "compliance=${comp}" >> "$GITHUB_OUTPUT"
          echo "passed=${passed}"   >> "$GITHUB_OUTPUT"
        fi
        exit 0

    # ── 3. Write job summary ──────────────────────────────────────────────────
    - name: Job summary
      if: ${{ always() }}
      shell: bash
      env:
        IN_OUTPUT:    ${{ inputs.output }}
        IN_THRESHOLD: ${{ inputs.threshold }}
        COMPLIANCE:   ${{ steps.run.outputs.compliance }}
        PASSED:       ${{ steps.run.outputs.passed }}
      run: |
        set -uo pipefail
        {
          echo "## Plumber compliance"
          echo ""
          if [ -n "${COMPLIANCE:-}" ]; then
            status="❌ below threshold"
            [ "${PASSED:-}" = "true" ] && status="✅ passed"
            echo "**Compliance:** ${COMPLIANCE}% &nbsp;·&nbsp; threshold ${IN_THRESHOLD}% &nbsp;·&nbsp; ${status}"
          else
            echo "_Plumber ran — see the job log for the full report._"
          fi
          echo ""
          if [ -f "${IN_OUTPUT:-}" ] && command -v python3 >/dev/null 2>&1; then
            python3 - "$IN_OUTPUT" <<'PY' || true
        import json, sys
        d = json.load(open(sys.argv[1]))
        s = d.get("plumberScore") or {}
        if s:
            print(f"**Score:** {s.get('score','?')} &nbsp;·&nbsp; {s.get('finalPoints','?')}/100 pts")
            c = s.get('counts', {})
            print("")
            print(f"| Critical | High | Medium | Low |")
            print(f"| --- | --- | --- | --- |")
            print(f"| {c.get('critical',0)} | {c.get('high',0)} | {c.get('medium',0)} | {c.get('low',0)} |")
        PY
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    # ── 4. Upload SARIF to GitHub Code Scanning ───────────────────────────────
    - name: Upload SARIF to Code Scanning
      if: ${{ always() && inputs.upload-sarif == 'true' && inputs.sarif != '' && hashFiles(inputs.sarif) != '' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif }}

    # ── 5. Upload report artifacts ────────────────────────────────────────────
    - name: Upload report artifacts
      if: ${{ always() && inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.output }}
          ${{ inputs.pbom }}
          ${{ inputs.pbom-cyclonedx }}
          ${{ inputs.sarif }}
        if-no-files-found: ignore
        retention-days: ${{ inputs.artifact-retention-days }}

    # ── 6. Enforce threshold (honours soft-fail) ──────────────────────────────
    - name: Enforce threshold
      if: ${{ always() }}
      shell: bash
      env:
        EXIT_CODE: ${{ steps.run.outputs.exit_code }}
        SOFT_FAIL: ${{ inputs.soft-fail }}
      run: |
        set -uo pipefail
        code="${EXIT_CODE:-2}"
        if [ "$code" = "0" ]; then exit 0; fi
        if [ "$code" = "2" ]; then
          echo "::error::Plumber failed to run (exit 2). Check the analyze step log for details."
          exit 1
        fi
        # exit 1 = compliance is below threshold
        if [ "$SOFT_FAIL" = "true" ]; then
          echo "::warning::Compliance is below the threshold, but soft-fail is enabled — the job will not fail."
          exit 0
        fi
        echo "::error::Compliance is below the configured threshold (${IN_THRESHOLD:-100}%)."
        exit 1
